name: Release

on:
  push:
    tags:
      - 'v*'   # 推送 v 开头的 tag 时触发（如 v1.0.0）

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: screen_time-windows-x86_64.exe
            binary_name: screen_time.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: screen_time-macos-x86_64
            binary_name: screen_time
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: screen_time-macos-aarch64
            binary_name: screen_time

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p dist
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "artifacts/$name/$name" ]; then
              cp "artifacts/$name/$name" "dist/$name"
            fi
          done
          ls -la dist/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT="${{ steps.version.outputs.VERSION }}"
          PREVIOUS=$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || echo "")
          if [ -n "$PREVIOUS" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREVIOUS..$CURRENT")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## 下载

            按系统选择对应二进制：

            | 系统 | 文件 |
            |------|------|
            | Windows x86_64 | `screen_time-windows-x86_64.exe` |
            | macOS Intel | `screen_time-macos-x86_64` |
            | macOS Apple Silicon | `screen_time-macos-aarch64` |
          files: dist/*
          draft: false
          prerelease: false
